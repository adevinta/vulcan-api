language: go
dist: trusty
go:
  - 1.13.3
services:
  - postgresql
  - docker
addons:
  postgresql: "9.6"
before_install:
  - source <(curl -s https://raw.githubusercontent.com/adevinta/vulcan-cicd/split/dkr.sh)
  - dkr_dockerhub_ratelimit
go_import_path: github.com/adevinta/vulcan-api
script:
  - _script/cibuild
  - source _script/setup-e2e-tests
  - _script/run-e2e-tests
after_success:
  - dkr_dockerhub_ratelimit
  - dkr_build
  - dkr_dockerhub_ratelimit
  - dkr_push
  - dkr_dockerhub_ratelimit
